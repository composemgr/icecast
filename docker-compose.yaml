name: icecast
services:
  music:
    image: zerg13/ices:latest
    container_name: music
    hostname: music
    restart: always
    pull_policy: always
    environment:
      - PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - STREAM_MEDIA_FOLDER=/media
      - STREAM_CONFIG=/ices/ices.conf
      - STREAM_PLAYLIST=/ices/playlist.txt
      - STREAM_PORT=8000
      - STREAM_HOST=icecast
      - STREAM_PROTOCOL=http
      - STREAM_MOUNTPOINT=/music
      - STREAM_PASSWORD=${APP_SECRET_KEY:-6d0c7389c587819a2192b88287f4fbec}
      - STREAM_NAME=Music
      - STREAM_GENRE=Various
      - STREAM_DESCRIPTION=$APP_ORG_NAME Music
      - STREAM_URL=https://$BASE_HOST_NAME/music
      - STREAM_BITRATE=320
      - STREAM_RANDOMIZE=0
      - STREAM_BACKGROUND=0
      - STREAM_CROSSFADE=2
      - STREAM_INTERPRETER_MODULE=ices
      - STREAM_PRIVATE=0
      - STREAM_PLAYLIST_TYPE=builtin
      - STREAM_REENCODED=0
      - STREAM_REENCODED_CHANNELS=2
      - STREAM_REENCODED_SAMPLERATE=44100
      - STREAM_VERBOSE=0
    volumes:
      - /mnt/Music/Mp3:/media
    depends_on:
      icecast:
        condition: service_healthy
    networks:
      - icecast

  nightcore:
    image: zerg13/ices:latest
    container_name: nightcore
    hostname: nightcore
    restart: always
    pull_policy: always
    environment:
      - PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - STREAM_MEDIA_FOLDER=/media
      - STREAM_CONFIG=/ices/ices.conf
      - STREAM_PLAYLIST=/ices/playlist.txt
      - STREAM_PORT=8000
      - STREAM_HOST=icecast
      - STREAM_PROTOCOL=http
      - STREAM_MOUNTPOINT=/nightcore
      - STREAM_PASSWORD=${APP_SECRET_KEY:-6d0c7389c587819a2192b88287f4fbec}
      - STREAM_NAME=NightCore
      - STREAM_GENRE=NightCore
      - STREAM_DESCRIPTION=$APP_ORG_NAME nightcore
      - STREAM_URL=https://$BASE_HOST_NAME/nightcore
      - STREAM_BITRATE=320
      - STREAM_RANDOMIZE=0
      - STREAM_BACKGROUND=0
      - STREAM_CROSSFADE=2
      - STREAM_INTERPRETER_MODULE=ices
      - STREAM_PRIVATE=0
      - STREAM_PLAYLIST_TYPE=builtin
      - STREAM_REENCODED=0
      - STREAM_REENCODED_CHANNELS=2
      - STREAM_REENCODED_SAMPLERATE=44100
      - STREAM_VERBOSE=0
    volumes:
      - /mnt/Music/Nightcore:/media
    depends_on:
      icecast:
        condition: service_healthy
    networks:
      - icecast

  icecast:
    image: libretime/icecast:latest
    container_name: icecast
    hostname: ${BASE_HOST_NAME:-icecast}
    restart: always
    pull_policy: always
    ports:
      - '172.17.0.1:61025:8000'
    environment:
      - ICECAST_MAX_CLIENTS=9999999999
      - ICECAST_MAX_SOURCES=9999999999
      - ICECAST_LOCATION=${ICECAST_LOCATION:-USA}
      - ICECAST_HOSTNAME=${BASE_HOST_NAME:-icecast}
      - ICECAST_ADMIN_USERNAME=${APP_ADMIN_USER:-admin}
      - ICECAST_ADMIN_EMAIL=admin@${BASE_HOST_NAME:-icecast}
      - ICECAST_ADMIN_PASSWORD=${APP_ADMIN_PASS:-ffe973f8400a949b00cb155a9a0943fe}
      - ICECAST_SOURCE_PASSWORD=${APP_SECRET_KEY:-6d0c7389c587819a2192b88287f4fbec}
      - ICECAST_RELAY_PASSWORD=${APP_SECRET_KEY:-6d0c7389c587819a2192b88287f4fbec}
    healthcheck:
      test: timeout 10s bash -c ':> /dev/tcp/127.0.0.1/8000' || exit 1
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 90s
    networks:
      - icecast

networks:
  icecast:
    name: icecast
    external: false
